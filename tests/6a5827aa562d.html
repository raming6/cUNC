<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>
:root{--bg:#0f0f17;--surface:#171724;--surface2:#1e1e30;--border:#2a2a40;--text:#e2e8f0;--muted:#64748b;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--accent:#818cf8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::-webkit-scrollbar{width:6px}
body::-webkit-scrollbar-track{background:var(--bg)}
body::-webkit-scrollbar-thumb{background:#2a2a50;border-radius:3px}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{font-size:1.4rem;font-weight:700;background:linear-gradient(90deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tagline{font-size:.8rem;color:var(--muted);margin-top:2px}
.header-links{display:flex;gap:1rem}
.header-links a{color:var(--muted);font-size:1.1rem;transition:color .2s}
.header-links a:hover{color:var(--text)}
.layout{display:grid;grid-template-columns:1fr 300px;gap:1.5rem;padding:1.5rem;max-width:1400px;margin:0 auto}
.main{min-width:0}
.section-title{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.6rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.85rem 1rem;border-left:3px solid;transition:transform .15s,background .15s;cursor:default}
.card:hover{background:var(--surface2);transform:translateY(-2px)}
.card.passed{border-left-color:var(--green)}
.card.failed{border-left-color:var(--red)}
.card.warning{border-left-color:var(--yellow)}
.card-top{display:flex;align-items:center;gap:.5rem;margin-bottom:.35rem}
.card-icon{font-size:.85rem;width:18px;text-align:center}
.card-name{font-weight:700;font-size:.9rem;font-family:'Fira Mono',monospace}
.card-msg{font-size:.78rem;color:var(--muted);line-height:1.4}
.sidebar{display:flex;flex-direction:column;gap:1rem}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.25rem}
.circle-wrap{position:relative;width:160px;height:160px;margin:0 auto 1rem}
.circle-wrap svg{display:block;width:100%;height:100%;transform:rotate(-90deg)}
.pct-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:2.2rem;font-weight:700}
.stat-row{display:flex;justify-content:center;align-items:baseline;gap:.4rem;margin-bottom:.5rem}
.stat-big{font-size:2rem;font-weight:700;color:var(--accent)}
.stat-total{font-size:1.2rem;color:var(--muted)}
.stat-fail{text-align:center;font-size:.9rem;color:var(--red);font-weight:600;margin-bottom:1rem}
.meta-item{display:flex;align-items:center;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid var(--border)}
.meta-item:last-child{border-bottom:none}
.meta-label{display:flex;align-items:center;gap:.5rem;font-size:.8rem;color:var(--muted)}
.meta-label i{width:14px;text-align:center}
.meta-value{font-size:.85rem;font-weight:600;text-align:right;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.links{display:flex;flex-direction:column;gap:.5rem;margin-top:.5rem}
.link-btn{display:flex;align-items:center;gap:.6rem;padding:.6rem .8rem;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);text-decoration:none;font-size:.85rem;transition:background .2s,border-color .2s}
.link-btn:hover{background:var(--border);border-color:var(--accent)}
.link-btn i{color:var(--accent);width:16px;text-align:center}
@media(max-width:900px){.layout{grid-template-columns:1fr}.sidebar{order:-1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card{opacity:0;animation:fadeUp .3s ease forwards}
</style>
</head>
